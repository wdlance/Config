  <div id="footer" class="hidden">
    <button id="download-all-btn" class="btn-primary">全部下载</button>
  </div>

  <div id="error-state" class="hidden">
    <p id="error-msg"></p>
  </div>

  <script src="mode_config.js"></script>
  <script src="mode1_css.js"></script>
  <script src="mode2_buildyou.js"></script>
